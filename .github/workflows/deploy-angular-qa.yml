name: Deploy Facturacion QA

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: [self-hosted, iis-betakorebix-qa]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Use Node
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Build Angular
      run: npm run build -- --configuration production -base-href /facturacion/

    - name: Deploy to IIS
      run: |
        xcopy /y /s dist\main-trion\browser C:\inetpub\betakorebix.com\facturacion\